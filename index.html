<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6b1f4e">
<title>مختصر النصيحة - الأذكار والأدعية الصحيحة</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --pink: #c8176a; --pink-light: #f4d6e8; --pink-dark: #6b1f4e;
  --bg: #fdf6fa; --card: #fff; --text: #2a1520; --sub: #7a4560;
  --border: #e8c8da; --repeat: #d4700a;
}
body { font-family: 'Traditional Arabic','Amiri','Arial',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; font-size:18px; }
.header { background:linear-gradient(135deg,var(--pink-dark),var(--pink)); color:#fff; padding:16px 20px 12px; text-align:center; position:sticky; top:0; z-index:100; box-shadow:0 2px 12px rgba(107,31,78,.25); }
.header h1 { font-size:1.3rem; font-weight:bold; }
.header p { font-size:.8rem; opacity:.85; margin-top:3px; }
.cat-nav { display:flex; overflow-x:auto; gap:7px; padding:10px 12px; background:#fff; border-bottom:1px solid var(--border); scrollbar-width:none; -webkit-overflow-scrolling:touch; }
.cat-nav::-webkit-scrollbar { display:none; }
.cat-btn { flex:0 0 auto; background:var(--pink-light); color:var(--pink-dark); border:1.5px solid var(--border); border-radius:20px; padding:5px 13px; font-size:.85rem; font-family:inherit; cursor:pointer; white-space:nowrap; transition:all .2s; font-weight:600; }
.cat-btn.active,.cat-btn:hover { background:var(--pink); color:#fff; border-color:var(--pink); }
.content { padding:12px; max-width:700px; margin:0 auto; }
.section-title { text-align:center; margin-bottom:12px; }
.section-title h2 { font-size:1.4rem; color:var(--pink-dark); background:var(--pink-light); display:inline-block; padding:5px 20px; border-radius:8px; border:1.5px solid var(--border); }
.subsection { color:var(--pink); font-size:1rem; font-weight:bold; margin:16px 0 8px; padding-bottom:4px; border-bottom:2px solid var(--pink-light); }
.azkar-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 16px 14px 42px; margin-bottom:10px; position:relative; box-shadow:0 1px 4px rgba(200,23,106,.06); transition:border-color .2s; }
.azkar-card:hover { border-color:var(--pink); }
.azkar-card.done-card { opacity:.5; background:#f8fff8; }
.azkar-num { position:absolute; top:14px; right:14px; background:var(--pink); color:#fff; border-radius:50%; width:24px; height:24px; text-align:center; line-height:24px; font-size:.75rem; font-weight:bold; }
.azkar-text { font-size:1.12rem; line-height:2; color:var(--text); white-space:pre-line; }
.repeat-badge { display:inline-block; background:#fff3e0; color:var(--repeat); border:1px solid #f5c48a; border-radius:12px; padding:2px 10px; font-size:.78rem; font-weight:bold; margin-top:6px; }
.note-text { font-size:.8rem; color:var(--sub); margin-top:7px; border-top:1px dashed var(--border); padding-top:6px; line-height:1.7; }
.counter-row { display:flex; align-items:center; gap:8px; margin-top:9px; }
.counter-btn { background:var(--pink); color:#fff; border:none; border-radius:8px; padding:5px 13px; font-size:.95rem; cursor:pointer; font-family:inherit; }
.counter-btn:hover { background:var(--pink-dark); }
.counter-display { font-size:1rem; font-weight:bold; color:var(--pink-dark); min-width:60px; text-align:center; }
.counter-reset { font-size:.75rem; color:var(--sub); background:none; border:1px solid var(--border); border-radius:6px; padding:3px 7px; cursor:pointer; font-family:inherit; }
.done-check { position:absolute; top:13px; left:12px; width:22px; height:22px; border-radius:50%; border:2px solid var(--border); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; }
.done-check.done { background:#27ae60; border-color:#27ae60; }
.done-check.done::after { content:'✓'; font-size:13px; color:#fff; }
.progress-label { font-size:.78rem; color:var(--sub); margin-bottom:3px; text-align:start; }
.progress-bar-wrap { background:#f0e6ec; border-radius:8px; height:6px; margin-bottom:12px; overflow:hidden; }
.progress-bar { height:100%; background:var(--pink); border-radius:8px; transition:width .4s; }
.reset-all-btn { display:block; margin:12px auto 4px; background:none; border:1.5px solid var(--border); color:var(--sub); border-radius:8px; padding:6px 18px; font-family:inherit; font-size:.85rem; cursor:pointer; }
.reset-all-btn:hover { border-color:var(--pink); color:var(--pink); }
@media(max-width:480px){ .azkar-text{font-size:1.03rem;} .header h1{font-size:1.15rem;} }
</style>
</head>

<script>
const CATS=[
{id:'sabah',name:'🌅 الصباح',azkar:[
{n:1,t:'أصبحنا على فِطرَةِ الإسلام، وكلمةِ الإخلاص، ودينِ نبيِّنا محمدٍ ﷺ، ومِلَّةِ أبينا إبراهيم، حنيفًا مسلمًا، وما كان من المشركين.'},
{n:2,t:'رضيتُ بالله ربًّا، وبالإسلام دينًا، وبمحمدٍ ﷺ نبيًّا.',r:'ثلاث مرات'},
{n:3,t:'اللهم بك أصبحنا، وبك أمسينا، وبك نحيا، وبك نموت، وإليك النشور.'},
{n:4,t:'لا إله إلا الله وحدَه، لا شريكَ له، له الملكُ، وله الحمدُ، وهو على كل شيء قدير.'},
{n:5,t:'يا حيُّ يا قيومُ برحمتِكَ أستغيثُ، أصلِحْ لي شأنِي كلَّه، ولا تَكِلْني إلى نفسي طَرْفَةَ عينٍ أبدًا.'},
{n:6,t:'آية الكرسي:\n﴿ ٱللَّهُ لَآ إِلَٰهَ إِلَّا هُوَ ٱلۡحَيُّ ٱلۡقَيُّومُۚ لَا تَأۡخُذُهُۥ سِنَةٞ وَلَا نَوۡمٞۚ لَّهُۥ مَا فِي ٱلسَّمَٰوَٰتِ وَمَا فِي ٱلۡأَرۡضِۗ مَن ذَا ٱلَّذِي يَشۡفَعُ عِندَهُۥٓ إِلَّا بِإِذۡنِهِۦۚ يَعۡلَمُ مَا بَيۡنَ أَيۡدِيهِمۡ وَمَا خَلۡفَهُمۡۖ وَلَا يُحِيطُونَ بِشَيۡءٖ مِّنۡ عِلۡمِهِۦٓ إِلَّا بِمَا شَآءَۚ وَسِعَ كُرۡسِيُّهُ ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضَۖ وَلَا يَـُٔودُهُۥ حِفۡظُهُمَاۚ وَهُوَ ٱلۡعَلِيُّ ٱلۡعَظِيمُ ﴾ [البقرة:٢٥٥]'},
{n:7,t:'اللهم أنتَ ربي، لا إلهَ إلا أنت، خلقتَني، وأنا عبدُك، وأنا على عهدِك ووعدِك ما استطعتُ، أعوذُ بك من شرِّ ما صنعتُ، أبوءُ لكَ بنعمتِكَ عَلَيَّ، وأبوءُ بذنبي، فاغفِرْ لي، فإنه لا يغفرُ الذنوبَ إلا أنت.'},
{n:8,t:'اللهم فاطِرَ السماواتِ والأرض، عالِمَ الغيبِ والشهادة، رَبَّ كُلِّ شيءٍ ومَلِيكَه، أشهدُ أن لا إلهَ إلا أنت، أعوذُ بك من شرِّ نفسي، وشرِّ الشيطانِ وشِرْكِه، وأن أقترِفَ على نفسي سوءًا، أو أجُرَّه إلى مسلم.'},
{n:9,t:'أصبحنا، وأصبحَ الملكُ لله، والحمدُ لله، لا إله إلا الله وحده، لا شريكَ له، له الملك، وله الحمد، وهوَ على كل شيء قدير، ربِّ أسألُك خيرَ ما في هذا اليوم، وخيرَ ما بعدَه، وأعوذُ بك من شرِّ ما في هذا اليوم، وشرِّ ما بعدَه، ربِّ أعوذُ بك من الكسلِ وسوءِ الكِبَر، ربِّ أعوذُ بك من عذابٍ في النار، وعذابٍ في القبر.'},
{n:10,t:'اللهم إني أسألُك العافيةَ في الدنيا والآخرة، اللهم إني أسألُك العفوَ والعافية، في ديني ودنيايَ، وأهلي ومالي، اللهم استُرْ عوراتي، وآمِنْ رَوْعَاتِي، اللهم احفظني من بين يَدَيَّ، ومن خلفي، وعن يميني، وعن شِمالي، ومن فوقي، وأعوذُ بعظمتِك أن أُغْتَالَ من تحتي.'},
{n:11,t:'أعوذُ بكلماتِ الله التامَّاتِ من شرِّ ما خلق.',r:'ثلاث مرات'},
{n:12,t:'أصبحتُ أُثني عليك حمدًا، وأشهدُ أن لا إله إلا الله.',r:'ثلاث مرات'},
{n:13,t:'بسمِ اللهِ الذي لا يَضُرُّ مع اسمِه شيءٌ في الأرضِ ولا في السماء، وهوَ السميعُ العليم.',r:'ثلاث مرات'},
{n:14,t:'سبحانَ اللهِ عددَ خَلْقِه، سبحانَ اللهِ رِضَا نفسِه، سبحانَ اللهِ زِنَةَ عرشِه، سبحانَ اللهِ مِدَادَ كلماتِه.',r:'ثلاث مرات'},
{n:15,t:'اللهم عافِني في بَدَني، اللهم عافِني في سمعي، اللهم عافِني في بصري، لا إله إلا أنت.',r:'ثلاث مرات',no:'ثم: اللهم إني أعوذُ بك من الكفرِ والفقر، اللهم إني أعوذُ بك من عذابِ القبر، لا إله إلا أنت. [ثلاث مرات]'},
{n:16,t:'سُوَر: (الإخلاص، والفلق، والناس).',r:'ثلاث مرات'},
{n:17,t:'﴿ حَسۡبِيَ ٱللَّهُ لَآ إِلَٰهَ إِلَّا هُوَ عَلَيۡهِ تَوَكَّلۡتُ وَهُوَ رَبُّ ٱلۡعَرۡشِ ٱلۡعَظِيمِ ﴾',r:'سبع مرات'},
{n:18,t:'لا إلهَ إلا الله وحدَه، لا شريكَ له، له الملك، وله الحمد، يُحيي ويُميتُ، وهو على كل شيء قدير.',r:'عشر مرات'},
{n:19,t:'اللهم صلِّ على محمدٍ وعلى آلِ محمد، كما صليتَ على إبراهيمَ وعلى آلِ إبراهيم، إنك حميدٌ مجيد، اللهم بارِكْ على محمدٍ وعلى آلِ محمد، كما باركتَ على إبراهيمَ وعلى آلِ إبراهيم، إنك حميدٌ مجيد.',r:'عشر مرات'},
{n:20,t:'سبحانَ الله وبحمده.',r:'مئة مرة',no:'أو: سبحانَ اللهِ العظيمِ وبحمده. [مئة مرة]'},
{n:21,t:'أستغفرُ الله.',r:'مئة مرة'},
{n:22,t:'سبحانَ الله. [مئة مرة]\nالحمدُ لله. [مئة مرة]\nاللهُ أكبر. [مئة مرة]\nلا إلهَ إلا الله وحدَه لا شريكَ له، له الملكُ وله الحمد، وهو على كل شيء قدير. [مئة مرة]'},
{n:23,t:'كفارة المجلس — بعد الفراغ من الأذكار:\nسبحانَك اللهمَّ وبحمدِك، أشهدُ أن لا إلهَ إلا أنت، أستغفِرُك، وأتوبُ إليك.'}
]},

{id:'nawm',name:'💤 النوم',azkar:[
{n:1,t:'باسمِك اللهم أحيا وأموت.'},
{n:2,t:'﴿ قُلۡ هُوَ ٱللَّهُ أَحَدٌ ﴾ والمعوِّذتين ثلاثًا، يمسح بهما رأسَه ووجهَه وما أقبلَ من جسده.'},
{n:3,t:'يضعُ يدَه اليمنى تحتَ خدِّه، ثم يقول:\nاللهم قِني عذابَك يومَ تَبْعَثُ عبادَك.',r:'ثلاث مرات'},
{n:4,t:'باسمِك ربي وضعتُ جنبي، وبك أرفعُه، إن أمسكتَ نفسي فارحمها، وإن أرسلتَها فاحفظها بما تحفظُ به عبادَك الصالحين.'},
{n:5,t:'الحمدُ للهِ الذي أطعَمَنا، وسَقَانا، وكَفَانا، وآوانا، فكم ممن لا كافيَ له ولا مُؤوِي.'},
{n:6,t:'﴿ ٱللَّهُ لَآ إِلَٰهَ إِلَّا هُوَ ٱلۡحَيُّ ٱلۡقَيُّومُ ﴾ الآية [البقرة:٢٥٥]'},
{n:7,t:'لا إله إلا الله وحدَه، لا شريكَ له، له الملكُ، وله الحمد، وهو على كل شيء قدير، لا حولَ ولا قوةَ إلا بالله، الحمدُ لله، والله أكبر، ولا إله إلا الله.'},
{n:8,t:'اللهم أنتَ خلقتَ نفسي، وأنتَ تتوفَّاها، لكَ مماتُها ومحياها، إن أحييتَها فاحفظها، وإن أمَّتَّها فاغفِرْ لها، اللهم إني أسألُك العافية.'},
{n:9,t:'أعوذُ بكلماتِ اللهِ التامَّةِ من شرِّ ما خلق.'},
{n:10,t:'اللهم فاطِرَ السماواتِ والأرض، عالِمَ الغيبِ والشهادة، رَبَّ كُلِّ شيءٍ ومَلِيكَه، أشهدُ أن لا إلهَ إلا أنت، أعوذُ بك من شرِّ نفسي، وشرِّ الشيطانِ وشِرْكِه، وأن أقترِفَ على نفسي سوءًا، أو أجُرَّه إلى مسلم.'},
{n:11,t:'اللهم ربَّ السماواتِ وربَّ الأرضِ وربَّ العرشِ العظيم، ربَّنا وربَّ كلِّ شيء، فالِقَ الحبِّ والنَّوى، مُنزِلَ التوراةِ والإنجيلِ والقرآن، أعوذُ بك من شرِّ كلِّ ذي شرٍّ أنتَ آخِذٌ بناصيتِه، أنتَ الأولُ فليسَ قبلَك شيء، وأنتَ الآخِرُ فليسَ بعدَك شيء، وأنتَ الظاهِرُ فليسَ فوقَك شيء، وأنتَ الباطِنُ فليسَ دونَك شيء، اقضِ عنَّا الدَّيْنَ، وأَغْنِنا من الفقر.'},
{n:12,t:'اللهمَّ إني أعوذُ بوجهِك الكريمِ وكلماتِك التامَّةِ من شرِّ ما أنتَ آخِذٌ بناصيتِه، اللهم أنتَ تكشِفُ المغرَمَ والمأثَم، اللهم إنه لا يُخلَفُ جُنْدُك، ولا يُخذَلُ حِزبُك، سُبحانَك اللهمَّ وبحمدِك.'},
{n:13,t:'بسمِ اللهِ وضعتُ جنبي، اللهمَّ اغفِرْ لي ذنبي، وأَخْسِئْ شيطاني، وفُكَّ رِهاني، وٱجْعَلْني في النَّدِيِّ الأعلى.'}
]},
{id:'yaqatha',name:'⚡ الاستيقاظ',azkar:[
{n:1,t:'الحمدُ للهِ الذي أحيانا بعدَ ما أماتَنا، وإليه النشور.'},
{n:2,t:'لا إله إلا الله وحدَه، لا شريكَ له، له الملكُ، وله الحمد، وهو على كل شيء قدير، سبحانَ الله، والحمدُ لله، ولا إله إلا الله، واللهُ أكبر، ولا حولَ ولا قوةَ إلا بالله.'},
{n:3,t:'إذا فزِعَ في منامه قال:\nأعوذُ بكلماتِ اللهِ التامَّات، من غضبِه وعقابِه، وشرِّ عبادِه، ومن هَمَزَاتِ الشياطين، وأن يَحْضُرُون.'},
{n:4,t:'إذا رأى ما يكره في النوم:\n١- يَنفُثُ عن يسارِه ثلاثًا.\n٢- يتعوَّذُ باللهِ من الشيطانِ الرجيم.\n٣- يتحوَّلُ عن جنبِه الذي كان عليه.\n٤- لا يُحدِّثُ بها أحدًا.'}
]},
{id:'wudhu',name:'💧 الوضوء',subs:[
{title:'ما يقول على وضوئه',azkar:[{n:1,t:'بسمِ الله.'}]},
{title:'ما يقول إذا فرغَ من وضوئه',azkar:[
{n:1,t:'أشهدُ أن لا إله إلا الله وحدَه، لا شريكَ له، وأشهدُ أن محمدًا عبدُه ورسوله.'},
{n:2,t:'سبحانَك اللهمَّ وبحمدِك، أشهدُ أن لا إلهَ إلا أنت، أستغفِرُك، وأتوبُ إليك.'}
]}
]},
{id:'libas',name:'👕 اللباس',subs:[
{title:'ما يقول إذا لبسَ ثوبَه',azkar:[
{n:1,t:'الحمدُ للهِ الذي كساني هذا، وَرَزَقَنِيهِ مِن غيرِ حولٍ مني ولا قوة.'}
]},
{title:'ما يقول إذا لبسَ ثوبًا جديدًا',azkar:[
{n:1,t:'يسمِّيه باسمِه ثم يقول:\nاللهم لكَ الحمدُ، أنتَ كسوتَنِيه، أسألُك خيرَه، وخيرَ ما صُنِعَ له، وأعوذُ بك من شرِّه، وشرِّ ما صُنِعَ له.'},
{n:2,t:'الحمدُ للهِ الذي كساني هذا وَرَزَقَنِيهِ مِن غيرِ حولٍ مني ولا قوة.'}
]}
]},
{id:'bayt',name:'🏠 البيت',subs:[
{title:'ما يقول إذا خرجَ من بيتِه',azkar:[
{n:1,t:'بسمِ الله، توكلتُ على الله، لا حولَ ولا قوةَ إلا بالله.'},
{n:2,t:'اللهم إني أعوذُ بك أن أَضِلَّ أو أُضَلَّ، أو أَزِلَّ أو أُزَلَّ، أو أَظلِمَ أو أُظلَم، أو أَجهَلَ أو يُجهَلَ عَلَيَّ.'}
]},
{title:'ما يقول إذا دخلَ بيتَه',azkar:[
{n:1,t:'اللهم إني أسألُك خيرَ المَوْلَج، وخيرَ المَخْرَج، بسمِ اللهِ وَلَجْنا، وبسمِ اللهِ خرَجنا، وعلى اللهِ ربِّنا توكَّلنا.'},
{n:2,t:'ثم يُسَلِّمُ على أهله.'}
]},
{title:'ما يدعو به في بيته',azkar:[
{n:1,t:'اللهم إني ظلمتُ نفسي ظُلمًا كثيرًا، ولا يغفرُ الذنوبَ إلا أنت، فاغفِرْ لي مغفرةً من عندِك، وارحمني، إنك أنتَ الغفورُ الرحيم.'}
]}
]},
{id:'masjid',name:'🕌 المسجد',subs:[
{title:'ما يقول إذا تَوَجَّهَ إلى المسجد',azkar:[
{n:1,t:'اللهمَّ اجعَلْ في قلبي نورًا، وفي لساني نورًا، وفي سمعي نورًا، وفي بصري نورًا، واجعَلْ من خلفي نورًا، ومن أمامي نورًا، واجعَلْ من فوقي نورًا، ومن تحتي نورًا، اللهمَّ أعطِني نورًا.'}
]},
{title:'ما يقول عند دخول المسجد',azkar:[
{n:1,t:'أعوذُ باللهِ العظيم، وبوجهِه الكريم، وسُلطانِه القديمِ من الشيطانِ الرجيم.'},
{n:2,t:'بسمِ الله، اللهمَّ صلِّ على محمدٍ وآلِه وسلِّم، اللهمَّ افتَحْ لي أبوابَ رحمتِك.'}
]},
{title:'ما يقول عند الخروج من المسجد',azkar:[
{n:1,t:'بسمِ الله، اللهمَّ صلِّ على محمدٍ وآلِه وسلِّم، اللهمَّ إني أسألُك من فضلِك.'}
]}
]},
{id:'salah',name:'🙏 أذكار الصلاة',subs:[
{title:'أذكار الركوع',azkar:[
{n:1,t:'سبحانَ ربِّيَ العظيم.',r:'ثلاثًا أو أكثر'},
{n:2,t:'سبحانَ ربِّيَ العظيمِ وبحمده.',r:'ثلاثًا'},
{n:3,t:'سبحانَك اللهمَّ ربَّنا وبحمدِك، اللهمَّ اغفِرْ لي.'},
{n:4,t:'سبحانَك اللهمَّ وبحمدِك، لا إله إلا أنت.'},
{n:5,t:'سُبُّوحٌ قُدُّوسٌ، ربُّ الملائكةِ والرُّوح.'},
{n:6,t:'سبحانَ ذي الجبروتِ والملكوتِ، والكبرياءِ والعظمة.'}
]},
{title:'ما يقول عند الاعتدال من الركوع',azkar:[
{n:1,t:'سمِعَ اللهُ لمن حَمِده.'},
{n:2,t:'ربَّنا ولكَ الحمد، حمدًا كثيرًا طيِّبًا مبارَكًا فيه.'}
]},
{title:'أذكار السجود',azkar:[
{n:1,t:'سبحانَ ربِّيَ الأعلى.',r:'ثلاثًا أو أكثر'},
{n:2,t:'سبحانَك اللهمَّ ربَّنا وبحمدِك، اللهمَّ اغفِرْ لي.'},
{n:3,t:'سُبُّوحٌ قُدُّوسٌ، ربُّ الملائكةِ والرُّوح.'},
{n:4,t:'اللهمَّ اغفِرْ لي ذنبي كلَّه، دِقَّه وجِلَّه، وأوَّلَه وآخِرَه، وعلانيتَه وسِرَّه.'},
{n:5,t:'اللهمَّ إني أعوذُ برِضاكَ من سَخَطِك، وبمعافاتِك من عقوبتِك، وأعوذُ بك منك، لا أُحصي ثناءً عليك، أنتَ كما أثنيتَ على نفسِك.'}
]},
{title:'ما يقول بين السجدتين',azkar:[
{n:1,t:'ربِّ اغفِرْ لي، ربِّ اغفِرْ لي.'},
{n:2,t:'اللهمَّ اغفِرْ لي، وارحمني، وعافِني، واهدِني، وارزُقني.'}
]}
]},
{id:'adhan',name:'📢 الأذان',subs:[
{title:'ما يقول سامعُ الأذان',azkar:[
{n:1,t:'يُردِّدُ مثلَ ما يقولُ المؤذِّن، إلا في الحيعلتَين:\n"حيَّ على الصلاة" و"حيَّ على الفلاح" فيقول:\nلا حولَ ولا قوةَ إلا بالله.'},
{n:2,t:'عند الشهادتين:\nوأنا أشهدُ أن لا إلهَ إلا الله وحدَه لا شريكَ له، وأن محمدًا عبدُه ورسولُه، رضيتُ باللهِ ربًّا، وبمحمدٍ رسولًا، وبالإسلامِ دينًا.'}
]},
{title:'ما يقول بعد الأذان',azkar:[
{n:1,t:'اللهمَّ ربَّ هذه الدعوةِ التامَّة، والصلاةِ القائمة، آتِ محمدًا الوسيلةَ والفضيلة، وابعَثْه مقامًا محمودًا الذي وعدتَه.'}
]}
]},
{id:'akl',name:'🍽️ الأكل والشرب',subs:[
{title:'قبل الأكل',azkar:[
{n:1,t:'بسمِ الله.',no:'وإذا نسيَ في أوَّلِ الأكل، ثم ذكَر، فليقل: بسمِ اللهِ أوَّلَه وآخِرَه.'}
]},
{title:'بعد الأكل',azkar:[
{n:1,t:'الحمدُ للهِ الذي أطعَمَني هذا، وَرَزَقَنِيهِ مِن غيرِ حولٍ مني ولا قوة.'},
{n:2,t:'الحمدُ للهِ حمدًا كثيرًا طيِّبًا مباركًا فيه، غيرَ مَكفِيٍّ، ولا مُوَدَّع، ولا مُستَغنًى عنه ربُّنا.'},
{n:3,t:'الحمدُ للهِ الذي أطعَمَ وسَقَى، وسَوَّغَه، وجعلَ له مَخرَجًا.'}
]},
{title:'دعاء الصائم عند الإفطار',azkar:[
{n:1,t:'اللهمَّ لك صُمتُ، وعلى رزقِك أفطرتُ.'},
{n:2,t:'ذهبَ الظمأُ، وابتلَّتِ العُروق، وثبتَ الأجرُ إن شاء الله.'}
]},
{title:'ما يقول إذا شربَ لبنًا',azkar:[
{n:1,t:'اللهمَّ بارِكْ لنا فيه، وزِدْنا منه.'}
]}
]},
{id:'ataas',name:'🤧 العطاس',azkar:[
{n:1,t:'العاطسُ يقول:\nالحمدُ للهِ',no:'أو: الحمدُ لله رَبِّ العالمين. أو: الحمدُ لله على كلِّ حال.'},
{n:2,t:'ويقول له جليسُه:\nyَرحَمُكَ الله.'},
{n:3,t:'ويرد العاطسُ:\nيَهدِيكُمُ اللهُ ويُصلِحُ بالَكم.'}
]},
{id:'safar',name:'✈️ السفر',subs:[
{title:'ما يقول عند ركوب الدابة أو السيارة',azkar:[
{n:1,t:'بسمِ الله.'},
{n:2,t:'﴿ سُبۡحَٰنَ ٱلَّذِي سَخَّرَ لَنَا هَٰذَا وَمَا كُنَّا لَهُۥ مُقۡرِنِينَ ٣٠ وَإِنَّآ إِلَىٰ رَبِّنَا لَمُنقَلِبُونَ ٣١ ﴾ [الزخرف:٣٠-٣١]'},
{n:3,t:'الحمدُ لله، اللهُ أكبر، اللهُ أكبر، اللهُ أكبر.\nسبحانَك اللهمَّ إني ظلمتُ نفسي فاغفِرْ لي، فإنه لا يغفرُ الذنوبَ إلا أنت.'}
]},
{title:'ما يقول عند المبيت في منزل',azkar:[
{n:1,t:'أعوذُ بكلماتِ اللهِ التامَّاتِ من شرِّ ما خلق.',no:'فإنه لا يضرُّه شيء حتى يرتحل من منزلِه ذلك.'}
]},
{title:'دعاء الرجوع من السفر',azkar:[
{n:1,t:'آيِبُون، تائِبُون، عابِدُون، لربِّنا حامِدُون.'}
]}
]},
{id:'alwiya',name:'🌧️ الأمور العلوية',subs:[
{title:'ما يقول إذا هاجتِ الريح',azkar:[
{n:1,t:'اللهمَّ إني أسألُك خيرَها، وخيرَ ما فيها، وخيرَ ما أُرسِلَتْ به، وأعوذُ بك من شرِّها، وشرِّ ما فيها، وشرِّ ما أُرسِلَتْ به.'},
{n:2,t:'اللهمَّ إني أعوذُ بك من شرِّها.'}
]},
{title:'ما يقول إذا نزلَ المطر',azkar:[
{n:1,t:'مُطِرْنا بفضلِ اللهِ ورحمتِه.'}
]},
{title:'ما يقول إذا أَكثَرَ المطرُ وخِيفَ منه الضرر',azkar:[
{n:1,t:'اللهمَّ حَوالَينا ولا عَلَينا، اللهمَّ على الآكامِ والظِّرابِ، وبُطُونِ الأودية، ومنابِتِ الشجَر.'}
]},
{title:'ما يقول إذا سمعَ الرعد',azkar:[
{n:1,t:'سبحانَ الذي يُسبِّحُ الرعدُ بحمدِه، والملائكةُ من خِيفتِه.'}
]},
{title:'إذا غشِيَتْه ظلمةٌ وريحٌ شديدة',azkar:[
{n:1,t:'يقرأُ سورتَيْ: الفلق والناس.'}
]}
]},
{id:'hajj',name:'🕋 الحج والعمرة',subs:[
{title:'التلبية',azkar:[
{n:1,t:'لَبَّيْكَ اللهمَّ لَبَّيْك، لَبَّيْكَ لا شريكَ لكَ لَبَّيْك، إنَّ الحمدَ والنِّعمةَ لكَ والمُلك، لا شريكَ لك.',no:'ويمكن أن يزيد: لبيكَ إلهَ الحق. أو: لبيكَ اللهمَّ لبيك، لبيكَ وسَعدَيك، والخيرُ في يديك، لبيك، والرغباءُ إليك والعمل.'}
]},
{title:'ما يقول عند دخول المسجد الحرام',azkar:[
{n:1,t:'اللهمَّ صلِّ على محمدٍ وآلِه وسلِّم، اللهمَّ افتَحْ لي أبوابَ رحمتِك.'},
{n:2,t:'أعوذُ باللهِ العظيم، وبوجهِه الكريم، وسُلطانِه القديمِ من الشيطانِ الرجيم.'}
]},
{title:'ما يقول إذا استلمَ الحجرَ الأسود',azkar:[
{n:1,t:'اللهُ أكبر.',no:'أو: بسمِ اللهِ واللهُ أكبر.'}
]},
{title:'الوقوفُ على الصفا والمروة',azkar:[
{n:1,t:'يقرأُ: ﴿ إِنَّ ٱلصَّفَا وَٱلۡمَرۡوَةَ مِن شَعَآئِرِ ٱللَّهِ ﴾ ثم يقول: أبدأُ بما بدأَ اللهُ به.'},
{n:2,t:'اللهُ أكبر، اللهُ أكبر، اللهُ أكبر،\nلا إلهَ إلا الله وحدَه، لا شريكَ له، له الملك، وله الحمد، يُحيي ويُميتُ، وهو على كل شيء قدير،\nلا إلهَ إلا الله وحدَه، أنجزَ وعدَه، ونصرَ عبدَه، وهزمَ الأحزابَ وحدَه.',no:'يقول ذلك ثلاثَ مرات، ويدعو بين ذلك.'}
]},
{title:'أفضل ما يُقال يومَ عرفة',azkar:[
{n:1,t:'لا إلهَ إلا الله وحدَه، لا شريكَ له، له الملكُ، وله الحمد، وهو على كل شيء قدير.',no:'يُكثِر من التسبيح، والتكبير، والتهليل، والتلبية.'}
]},
{title:'عند رمي الجمرات',azkar:[
{n:1,t:'اللهُ أكبر. — يكبِّرُ عند كل حصاة.'}
]},
{title:'زيارةُ قبرِ النبي ﷺ وقبور البقيع',azkar:[
{n:1,t:'السلامُ عليكم دارَ قومٍ مؤمنين، وإنَّا إن شاءَ اللهُ بكم لاحِقُون.'},
{n:2,t:'السلامُ على أهلِ الديارِ من المؤمنينَ والمسلمين، ويرحمُ اللهُ المستقدِمينَ منكم والمستأخِرين، وإنَّا إن شاءَ اللهُ بكم لاحِقُون.'}
]}
]},
{id:'mutafarriqa',name:'📿 أذكار متفرقة',subs:[
{title:'من القرآن الكريم',azkar:[
{n:1,t:'ما يقول إذا دُعِيَ إلى حكمِ الله ورسوله:\n﴿ سَمِعۡنَا وَأَطَعۡنَا ﴾ [النور:٥١]'},
{n:2,t:'ما يقول الداعي إذا لم يُتَّبَع:\n﴿ حَسۡبِيَ ٱللَّهُ لَآ إِلَٰهَ إِلَّا هُوَ عَلَيۡهِ تَوَكَّلۡتُ وَهُوَ رَبُّ ٱلۡعَرۡشِ ٱلۡعَظِيمِ ﴾ [التوبة:١٢٩]'},
{n:3,t:'إذا دُعِيَ إلى فعلٍ محرَّم:\n﴿ مَعَاذَ ٱللَّهِ ﴾ [يوسف:٢٣]'},
{n:4,t:'إذا أراد فعلَ شيء غدًا:\n﴿ إِن شَآءَ ٱللَّهُ ﴾ [الكهف:٢٣-٢٤]'},
{n:5,t:'إذا رُزِقَ رزقًا وفيرًا:\n﴿ هَٰذَا مِن فَضۡلِ رَبِّي ﴾ [النمل:٤٠]'},
{n:6,t:'ما يقول إذا استحفظَ رجلٌ ابنَه أو غيرَه:\n﴿ فَٱللَّهُ خَيۡرٌ حَٰفِظٗا وَهُوَ أَرۡحَمُ ٱلرَّٰحِمِينَ ﴾ [يوسف:٦٤]'},
{n:7,t:'إذا تعجَّب:\n﴿ سُبۡحَٰنَ رَبِّي ﴾ [الإسراء:٩٣]\nأو: لا إله إلا الله. أو: سبحانَ الله. أو: اللهُ أكبر.'}
]},
{title:'من السنة الشريفة',azkar:[
{n:1,t:'إذا أخبرَه أنه يُحِبُّه في الله:\nأَحَبَّكَ الذي أحبَبتَني له.'},
{n:2,t:'إذا رأى أخاه المسلم يضحك:\nأضحكَ اللهُ سنَّك.'},
{n:3,t:'إذا عرضَ عليه من أهلِه وماله:\nبارَكَ اللهُ لكَ في أهلِك ومالِك.'},
{n:4,t:'إذا قيلَ له: غفَرَ اللهُ لك:\nوَلَك.'},
{n:5,t:'إذا نادى شخصٌ شخصًا، أجابَه بقوله:\nلَبَّيْك أو: لَبَّيْك وَسَعدَيك.'},
{n:6,t:'إذا مدحَ رجلًا:\nأَحسَبُه — والله حسيبُه — كذا، واللهُ أُزكِّي على الله أحدًا.'},
{n:7,t:'إذا بُشِّرَ بخبرٍ يسُرُّه:\nالحمدُ لله، اللهُ أكبر.'},
{n:8,t:'إذا سمعَ أن رجلًا يغتاب:\nبِئسَ ما قلتَ، واللهِ ما علِمنا عليه إلا خيرًا.'},
{n:9,t:'إذا رأى ما يُعجِبُه:\nسبحانَ الله.'},
{n:10,t:'إذا أسدى إليه شخصٌ معروفًا:\n١- جزاكَ اللهُ خيرًا.\n٢- اللهمَّ فقِّهْه في الدين.\n٣- اللهمَّ أكثِرْ مالَه وولَدَه، وبارِكْ له فيما أعطاه.'},
{n:11,t:'إذا رأى مُبتَلًى بمرضٍ أو غيرِه:\nالحمدُ للهِ الذي عافاني مما ابتلاكَ به، وفضَّلَني على كثيرٍ من خَلْقِه تفضيلًا.',no:'يقولُه سِرًّا بحيثُ لا يسمعُه المُبتَلَى.'},
{n:12,t:'إذا ابتاعَ دابَّةً أو سيارةً:\nاللهمَّ إني أسألُك خيرَها وخيرَ ما جُبِلَتْ عليه، وأعوذُ بك من شرِّها وشرِّ ما جُبِلَتْ عليه.'},
{n:13,t:'إذا أُتِيَ ببَاكُورةِ الثمر:\nيضعُها على عينيه، ثم على شفتيه، ثم يقول:\nاللهمَّ بارِكْ لنا في ثمَرِنا، وبارِكْ لنا في مدينتِنا، وبارِكْ لنا في صاعِنا، وبارِكْ لنا في مُدِّنا، بركةً مع بركة.'},
{n:14,t:'كفارة المجلس:\nسبحانَك اللهمَّ وبحمدِك، أشهدُ أن لا إلهَ إلا أنت، أستغفِرُك، وأتوبُ إليك.'}
]}
]},
{id:'marid',name:'🤲 المريض والرقية',subs:[
{title:'الدعاء للمريض',azkar:[
{n:1,t:'أسألُ اللهَ العظيم، ربَّ العرشِ العظيم، أن يشفِيَك.',r:'سبع مرات'},
{n:2,t:'بسمِ الله، أرقِيك، من كلِّ شيءٍ يُؤذِيك، ومن شرِّ كلِّ نفسٍ أو عينِ حاسِد، إذا حسَد، اللهُ يشفِيك، بسمِ الله أرقِيك.'},
{n:3,t:'امسَحِ البأسَ ربَّ الناس، بيدِك الشفاء، لا كاشِفَ له إلا أنت.'},
{n:4,t:'أذهِبِ البأسَ ربَّ الناس، اشفِ أنتَ الشافي، لا شِفاءَ إلا شِفاؤُك، شِفاءً لا يُغادِرُ سَقَمًا.'},
{n:5,t:'بسمِ اللهِ يُبرِيك، ومن كلِّ داءٍ يَشفِيك، ومن شرِّ حاسِدٍ إذا حسَد، ومن شرِّ كلِّ ذي عَيْن.'}
]},
{title:'دعاء المريض نفسه',azkar:[
{n:1,t:'يضعُ يدَه على موضع الألم ويقول:\nبسمِ الله. [ثلاثًا]\nأعوذُ باللهِ وقُدرتِه من شرِّ ما أجِدُ وأُحاذِر. [سبعًا]'}
]},
{title:'ما يقول عند حضور أجلِه',azkar:[
{n:1,t:'يُلقَّنُ المحتضَرُ:\nلا إلهَ إلا الله.',no:'قال ﷺ: "لقِّنوا موتاكم لا إلهَ إلا الله."'},
{n:2,t:'يقول لذويه:\nما أرى الأجلَ إلا قد اقتربَ، فاتَّقُوا اللهَ واصبِروا.'}
]}
]},
{id:'mutlaq',name:'📖 الأذكار المطلقة',subs:[
{title:'الورد الأول',azkar:[
{n:1,t:'﴿ رَّبِّ أَعُوذُ بِكَ مِنۡ هَمَزَٰتِ ٱلشَّيَٰطِينِ ٩٧ وَأَعُوذُ بِكَ رَبِّ أَن يَحۡضُرُونِ ﴾ [المؤمنون:٩٧-٩٨]'},
{n:2,t:'﴿ رَبَّنَا تَقَبَّلۡ مِنَّآ إِنَّكَ أَنتَ ٱلسَّمِيعُ ٱلۡعَلِيمُ ﴾ [البقرة:١٢٧]'},
{n:3,t:'﴿ رَبَّنَآ ءَاتِنَا فِي ٱلدُّنۡيَا حَسَنَةٗ وَفِي ٱلۡأٓخِرَةِ حَسَنَةٗ وَقِنَا عَذَابَ ٱلنَّارِ ﴾ [البقرة:٢٠١]'},
{n:4,t:'﴿ سَمِعۡنَا وَأَطَعۡنَا غُفۡرَانَكَ رَبَّنَا وَإِلَيۡكَ ٱلۡمَصِيرُ ﴾ [البقرة:٢٨٥]'},
{n:5,t:'﴿ رَبَّنَا لَا تُؤَاخِذۡنَآ إِن نَّسِينَآ أَوۡ أَخۡطَأۡنَا رَبَّنَا وَلَا تَحۡمِلۡ عَلَيۡنَآ إِصۡرٗا كَمَا حَمَلۡتَهُۥ عَلَى ٱلَّذِينَ مِن قَبۡلِنَا رَبَّنَا وَلَا تُحَمِّلۡنَا مَا لَا طَاقَةَ لَنَا بِهِۦ وَٱعۡفُ عَنَّا وَٱغۡفِرۡ لَنَا وَٱرۡحَمۡنَآ أَنتَ مَوۡلَىٰنَا فَٱنصُرۡنَا عَلَى ٱلۡقَوۡمِ ٱلۡكَٰفِرِينَ ﴾ [البقرة:٢٨٦]'},
{n:6,t:'اللهمَّ إني أشهدُ أنك أنتَ اللهُ الذي لا إلهَ إلا أنت، الأحدُ الصمد، الذي لم يَلِدْ ولم يُولَد، ولم يكن له كُفُوًا أحد، أن تغفِرَ لي ذنوبي، إنك أنتَ الغفورُ الرحيم.'},
{n:7,t:'اللهمَّ أنتَ ربي، لا إلهَ إلا أنت، خلقتَني، وأنا عبدُك، وأنا على عهدِك ووعدِك ما استطعتُ، أعوذُ بك من شرِّ ما صنعتُ، أبوءُ لكَ بنعمتِكَ عَلَيَّ، وأبوءُ بذنبي، فاغفِرْ لي، فإنه لا يغفرُ الذنوبَ إلا أنت.'},
{n:8,t:'اللهمَّ صلِّ على محمدٍ وعلى آلِ محمد، كما صليتَ على إبراهيمَ وعلى آلِ إبراهيم، إنك حميدٌ مجيد، اللهمَّ بارِكْ على محمدٍ وعلى آلِ محمد، كما باركتَ على إبراهيمَ وعلى آلِ إبراهيم، إنك حميدٌ مجيد.'}
]},
{title:'الورد الثاني',azkar:[
{n:1,t:'لا إله إلا الله الحليمُ الكريم،\nلا إله إلا الله رَبُّ العرشِ العظيم،\nلا إله إلا الله، سبحانَ اللهِ ربِّ السماواتِ السبع،\nورَبُّ العرشِ الكريم،\nالحمدُ للهِ رَبِّ العالمين.'},
{n:2,t:'﴿ رَّبَّنَآ ءَامَنَّا بِمَآ أَنزَلۡتَ وَٱتَّبَعۡنَا ٱلرَّسُولَ فَٱكۡتُبۡنَا مَعَ ٱلشَّٰهِدِينَ ﴾ [آل عمران:٥٣]'},
{n:3,t:'﴿ رَبَّنَا ٱغۡفِرۡ لَنَا ذُنُوبَنَا وَإِسۡرَافَنَا فِيٓ أَمۡرِنَا وَثَبِّتۡ أَقۡدَامَنَا وَٱنصُرۡنَا عَلَى ٱلۡقَوۡمِ ٱلۡكَٰفِرِينَ ﴾ [آل عمران:١٤٧]'},
{n:4,t:'اللهمَّ احفظني بالإسلامِ قائمًا، واحفظني بالإسلامِ قاعدًا، واحفظني بالإسلامِ راقدًا، اللهمَّ إني أسألُك من كلِّ خيرٍ خزائنُه بيدِك، وأعوذُ بك من كلِّ شرٍّ خزائنُه بيدِك.'},
{n:5,t:'اللهمَّ إني أسألُك من الخيرِ كلِّه، عاجلِه وآجِلِه، ما علِمتُ منه وما لم أعلم، وأعوذُ بك من الشرِّ كلِّه، عاجلِه وآجِلِه، ما علِمتُ منه وما لم أعلم، وأسألُك الجنَّة، وأعوذُ بك من النار، وأسألُك ما سألَك منه عبدُك ورسولُك محمدٌ ﷺ، وأعوذُ بك مما تعوَّذَ منه عبدُك ورسولُك محمدٌ ﷺ، وما قضيتَ لي من قضاءٍ فاجعَلْ عاقبتَه لي خيرًا.'}
]},
{title:'الورد الثالث',azkar:[
{n:1,t:'﴿ رَبَّنَآ إِنَّنَآ ءَامَنَّا فَٱغۡفِرۡ لَنَا ذُنُوبَنَا وَقِنَا عَذَابَ ٱلنَّارِ ﴾ [آل عمران:١٦]'},
{n:2,t:'﴿ رَبِّ ٱجۡعَلۡنِي مُقِيمَ ٱلصَّلَوٰةِ وَمِن ذُرِّيَّتِي رَبَّنَا وَتَقَبَّلۡ دُعَآءِ ٤٠ رَبَّنَا ٱغۡفِرۡ لِي وَلِوَٰلِدَيَّ وَلِلۡمُؤۡمِنِينَ يَوۡمَ يَقُومُ ٱلۡحِسَابُ ﴾ [إبراهيم:٤٠-٤١]'},
{n:3,t:'﴿ رَّبِّ ٱرۡحَمۡهُمَا كَمَا رَبَّيَانِي صَغِيرٗا ﴾ [الإسراء:٢٤]'},
{n:4,t:'﴿ رَّبِّ أَدۡخِلۡنِي مُدۡخَلَ صِدۡقٖ وَأَخۡرِجۡنِي مُخۡرَجَ صِدۡقٖ وَٱجۡعَل لِّي مِن لَّدُنكَ سُلۡطَٰنٗا نَّصِيرٗا ﴾ [الإسراء:٨٠]'},
{n:5,t:'لا إله إلا الله وحدَه لا شريكَ له، له الملكُ وله الحمد، وهو على كل شيء قدير، اللهمَّ اغفِرْ لي، وارحمني، واهدِني، وارزُقني، وعافِني.'},
{n:6,t:'اللهمَّ إني أسألُك فعلَ الخيرات، وتركَ المنكرات، وحُبَّ المساكين، وأن تغفِرَ لي وترحَمَني، وإذا أردتَ فتنةَ قومٍ فتوفَّني غيرَ مفتون، أسألُك حُبَّك، وحُبَّ مَن يُحِبُّك، وحُبَّ عملٍ يُقرِّبُ إلى حُبِّك.'}
]},
{title:'الورد الرابع',azkar:[
{n:1,t:'﴿ رَّبَّنَآ إِنَّنَا سَمِعۡنَا مُنَادِيٗا يُنَادِي لِلۡإِيمَٰنِ أَنۡ ءَامِنُواْ بِرَبِّكُمۡ فَـَٔامَنَّاۚ رَبَّنَا فَٱغۡفِرۡ لَنَا ذُنُوبَنَا وَكَفِّرۡ عَنَّا سَيِّـَٔاتِنَا وَتَوَفَّنَا مَعَ ٱلۡأَبۡرَارِ ١٩٣ رَبَّنَا وَءَاتِنَا مَا وَعَدتَّنَا عَلَىٰ رُسُلِكَ وَلَا تُخۡزِنَا يَوۡمَ ٱلۡقِيَٰمَةِ إِنَّكَ لَا تُخۡلِفُ ٱلۡمِيعَادَ ﴾ [آل عمران:١٩٣-١٩٤]'},
{n:2,t:'﴿ رَبَّنَآ ءَاتِنَا مِن لَّدُنكَ رَحۡمَةٗ وَهَيِّئۡ لَنَا مِنۡ أَمۡرِنَا رَشَدٗا ﴾ [الكهف:١٠]'},
{n:3,t:'﴿ رَّبِّ زِدۡنِي عِلۡمٗا ﴾ [طه:١١٤]'},
{n:4,t:'اللهمَّ إني أسألُك بأن لكَ الحمد، لا إلهَ إلا أنت، يا بديعَ السماواتِ والأرض، يا ذا الجلالِ والإكرام، يا حيُّ يا قيُّوم، أسألُك الجنَّة، وأعوذُ بك من النار.'},
{n:5,t:'اللهمَّ جدِّدِ الإيمانَ في قلوبِنا.'},
{n:6,t:'اللهمَّ لك أسلمتُ، وبك آمنتُ، وعليك توكلتُ، وإليك أنبتُ، وبك خاصمتُ، اللهمَّ إني أعوذُ بعِزَّتِك — لا إلهَ إلا أنت — أن تُضِلَّني، أنتَ الحيُّ الذي لا يموت، والجنُّ والإنسُ يموتون.'},
{n:7,t:'اللهمَّ أصلِحْ لي دِينِيَ الذي هو عِصمةُ أمري، وأصلِحْ لي دنياي التي فيها معاشي، وأصلِحْ لي آخِرَتي التي فيها معادي، واجعَلِ الحياةَ زيادةً لي في كل خير، واجعَلِ الموتَ راحةً لي من كل شر.'}
]},
{title:'الورد الخامس',azkar:[
{n:1,t:'﴿ لَّآ إِلَٰهَ إِلَّآ أَنتَ سُبۡحَٰنَكَ إِنِّي كُنتُ مِنَ ٱلظَّٰلِمِينَ ﴾ [الأنبياء:٨٧]'},
{n:2,t:'﴿ رَّبِّ ٱغۡفِرۡ وَٱرۡحَمۡ وَأَنتَ خَيۡرُ ٱلرَّٰحِمِينَ ﴾ [المؤمنون:١١٨]'},
{n:3,t:'اللهمَّ إني أسألُك الجنَّة.',r:'ثلاثًا'},
{n:4,t:'اللهمَّ إني أعوذُ بك من النار.',r:'ثلاثًا'},
{n:5,t:'اللهمَّ إني أسألُك العافيةَ في الدنيا والآخرة.'},
{n:6,t:'اللهمَّ إني أعوذُ بك من العجزِ والكسَل، والجُبنِ والهَرَم، والبُخل، وأعوذُ بك من عذابِ القبر، وأعوذُ بك من فتنةِ المحيا والممات.'},
{n:7,t:'اللهمَّ إني أعوذُ بك من علمٍ لا ينفع، ومن دعاءٍ لا يُسمَع.'}
]},
{title:'الورد السادس',azkar:[
{n:1,t:'﴿ رَّبِّ أَوۡزِعۡنِيٓ أَنۡ أَشۡكُرَ نِعۡمَتَكَ ٱلَّتِيٓ أَنۡعَمۡتَ عَلَيَّ وَعَلَىٰ وَٰلِدَيَّ وَأَنۡ أَعۡمَلَ صَٰلِحٗا تَرۡضَىٰهُ وَأَدۡخِلۡنِي بِرَحۡمَتِكَ فِي عِبَادِكَ ٱلصَّٰلِحِينَ ﴾ [النمل:١٩]'},
{n:2,t:'﴿ رَبِّ إِنِّي ظَلَمۡتُ نَفۡسِي فَٱغۡفِرۡ لِي ﴾ [القصص:١٦]'},
{n:3,t:'اللهمَّ أحيِني مسكينًا، وأمِتْني مسكينًا، واحشُرني في زُمرةِ المساكين.'},
{n:4,t:'اللهمَّ اكفِني بحلالِك عن حرامِك، وأغنِني بفضلِك عمَّن سِواك.'},
{n:5,t:'اللهمَّ إني أعوذُ بك من الفقر، والقِلَّة، والذِّلَّة، وأعوذُ بك أن أظلِمَ أو أُظلَم.'}
]},
{title:'الورد السابع',azkar:[
{n:1,t:'﴿ رَبَّنَا ٱصۡرِفۡ عَنَّا عَذَابَ جَهَنَّمَ ﴾ [الفرقان:٦٥]'},
{n:2,t:'﴿ رَبَّنَا هَبۡ لَنَا مِنۡ أَزۡوَٰجِنَا وَذُرِّيَّٰتِنَا قُرَّةَ أَعۡيُنٖ وَٱجۡعَلۡنَا لِلۡمُتَّقِينَ إِمَامًا ﴾ [الفرقان:٧٤]'},
{n:3,t:'اللهمَّ ربَّنا آتِنا في الدنيا حسنةً، وفي الآخرةِ حسنةً، وقِنا عذابَ النار.'},
{n:4,t:'اللهمَّ إني أقسِمُ لكَ من خشيتِك ما تحولُ به بيني وبين معاصيك، ومن طاعتِك ما تُبلِّغُني به جنَّتك، ومن اليقينِ ما تهوِّنُ به علَيَّ مصائبَ الدنيا.'},
{n:5,t:'اللهمَّ إنَّا نسألُك أن تَستُرَ عَوراتِنا، وتُؤمِّنَ رَوعاتِنا.'},
{n:6,t:'اللهمَّ إني أسألُك اليقينَ والمعافاة.'},
{n:7,t:'اللهمَّ إني أسألُك الهُدى، والتُّقى، والعفافَ، والغِنى.'}
]},
{title:'الورد الثامن',azkar:[
{n:1,t:'﴿ رَّبِّ أَوۡزِعۡنِيٓ أَنۡ أَشۡكُرَ نِعۡمَتَكَ ٱلَّتِيٓ أَنۡعَمۡتَ عَلَيَّ وَعَلَىٰ وَٰلِدَيَّ وَأَنۡ أَعۡمَلَ صَٰلِحٗا تَرۡضَىٰهُ وَأَصۡلِحۡ لِي فِي ذُرِّيَّتِيٓ إِنِّي تُبۡتُ إِلَيۡكَ وَإِنِّي مِنَ ٱلۡمُسۡلِمِينَ ﴾ [الأحقاف:١٥]'},
{n:2,t:'﴿ رَّبِّ ٱغۡفِرۡ لِي وَلِوَٰلِدَيَّ وَلِمَن دَخَلَ بَيۡتِيَ مُؤۡمِنٗا وَلِلۡمُؤۡمِنِينَ وَٱلۡمُؤۡمِنَٰتِ ﴾ [نوح:٢٨]'},
{n:3,t:'لا إله إلا أنت، سبحانَك، إني كنتُ من الظالمين.'},
{n:4,t:'اللهمَّ عافِني في جسَدي، وعافِني في بصَري، واجعَلْها الوارثَ مني، لا إلهَ إلا أنت، الحليمُ الكريم، سبحانَ اللهِ ربِّ العرشِ العظيم، والحمدُ للهِ ربِّ العالمين.'},
{n:5,t:'اللهمَّ إني أعوذُ بك من البَرَصِ والجُنونِ والجُذام، ومن سيِّءِ الأسقام.'}
]},
{title:'الورد التاسع',azkar:[
{n:1,t:'﴿ رَبَّنَا وَسِعۡتَ كُلَّ شَيۡءٖ رَّحۡمَةٗ وَعِلۡمٗا فَٱغۡفِرۡ لِلَّذِينَ تَابُواْ وَٱتَّبَعُواْ سَبِيلَكَ وَقِهِمۡ عَذَابَ ٱلۡجَحِيمِ ﴾ [غافر:٧]'},
{n:2,t:'﴿ رَبَّنَا ٱغۡفِرۡ لَنَا وَلِإِخۡوَٰنِنَا ٱلَّذِينَ سَبَقُونَا بِٱلۡإِيمَٰنِ وَلَا تَجۡعَلۡ فِي قُلُوبِنَا غِلًّا لِّلَّذِينَ ءَامَنُواْ رَبَّنَآ إِنَّكَ رَءُوفٞ رَّحِيمٞ ﴾ [الحشر:١٠]'},
{n:3,t:'اللهمَّ إنا نسألُك من خيرِ ما سألَك منه نبيُّك ﷺ، ونعوذُ بك من شرِّ ما استعاذَ منه نبيُّك ﷺ، وأنتَ المستعان، وعليكَ البلاغ، ولا حولَ ولا قوةَ إلا بالله.'},
{n:4,t:'اللهمَّ إني أسألُك الخيرَ كلَّه، عاجلَه وآجِلَه، ما علِمتُ منه وما لم أعلم، وأعوذُ بك من الشرِّ كلِّه، ما علِمتُ منه وما لم أعلم.'}
]},
{title:'الورد العاشر',azkar:[
{n:1,t:'اللهمَّ ربِّ اغفِرْ لي خطيئتي وجهلي، وإسرافي في أمري، وما أنتَ أعلمُ به مني، اللهمَّ اغفِرْ لي جِدِّي وهَزْلي، وخطَئي وعَمدي، وكلُّ ذلك عندي، اللهمَّ اغفِرْ لي ما قدَّمتُ وما أخَّرتُ، وما أسرَرتُ وما أعلنتُ، وما أنتَ أعلمُ به مني، أنتَ المقدِّم وأنتَ المؤخِّر، وأنتَ على كل شيء قدير.'},
{n:2,t:'اللهمَّ إني ظلمتُ نفسي ظُلمًا كثيرًا، ولا يغفرُ الذنوبَ إلا أنت، فاغفِرْ لي مغفرةً من عندِك، وارحمني، إنك أنتَ الغفورُ الرحيم.'},
{n:3,t:'اللهمَّ إني أعوذُ بك من عذابِ النار، وعذابِ القبر، ومن فتنةِ المحيا والممات، ومن شرِّ فتنةِ المسيحِ الدجال، اللهمَّ اغسِلْ خطاياي بالماءِ والثلجِ والبَرَد، ونقِّ قلبي من الخطايا كما نقَّيتَ الثوبَ الأبيضَ من الدَّنَس، وباعِدْ بيني وبين خطاياي كما باعدتَ بين المشرقِ والمغرب.'},
{n:4,t:'اللهمَّ إني أعوذُ بك من الفقرِ والقِلَّةِ والذِّلَّة، والمَسكَنَةِ والغَفلَة.'},
{n:5,t:'اللهمَّ إني أعوذُ بك من الكسلِ والكَسَل، والجُبنِ والهَرَم، وسُوءِ الكِبَر.'},
{n:6,t:'اللهمَّ إني عبدُك، وابنُ عبدِك، وابنُ أَمَتِك، في قبضتِك، ناصيتي بيدِك، ماضٍ فيَّ حُكمُك، عدلٌ فيَّ قضاؤُك، أسألُك بكلِّ اسمٍ هو لك، سمَّيتَ به نفسَك، أو أنزلتَه في كتابِك، أو علَّمتَه أحدًا من خَلقِك، أو استأثَرتَ به في علمِ الغيبِ عندَك، أن تجعلَ القرآنَ العظيمَ ربيعَ قلبي، ونورَ صدري، وجلاءَ حُزني، وذهابَ هَمِّي.'},
{n:7,t:'اللهمَّ صلِّ على محمدٍ وعلى أهلِ بيتِه، وعلى أزواجِه وذُرِّيَّتِه، كما صليتَ على آلِ إبراهيم، وبارِكْ على محمدٍ النبيِّ الأمِّيِّ وعلى آلِ محمدٍ وأزواجِه وذُرِّيَّتِه، كما باركتَ على آلِ إبراهيم، إنك حميدٌ مجيد.'}
]},
{title:'الورد الحادي عشر',azkar:[
{n:1,t:'لا إله إلا الله الحليمُ الكريم،\nلا إله إلا الله العليُّ العظيم،\nلا إله إلا الله، سبحانَ اللهِ ربِّ السماواتِ السبع، ورَبُّ العرشِ الكريم.'},
{n:2,t:'اللهمَّ برحمتِك أرجو فلا تَكِلْني إلى نفسي طَرْفَةَ عين، وأصلِحْ لي شأني كلَّه، لا إله إلا أنت.'},
{n:3,t:'اللهمَّ إني أعوذُ بك من منكراتِ الأخلاقِ والأعمالِ والأهواء.'},
{n:4,t:'اللهمَّ إني أعوذُ بك من جارِ السوءِ في دارِ المُقام.'},
{n:5,t:'اللهمَّ إني أعوذُ بك من الكسلِ والعجز، والبُخلِ والهَرَم، وعذابِ القبر.'},
{n:6,t:'اللهمَّ إني أعوذُ بك من قلبٍ لا يخشَع، ومن نفسٍ لا تشبَع، ومن علمٍ لا ينفع، ومن دعاءٍ لا يُسمَع.'},
{n:7,t:'اللهمَّ إني أعوذُ بك من الهَدْم، والتَّردِّي، والغَرَق، والحَرَق، وأعوذُ بك أن يتخبَّطَني الشيطانُ عند الموت.'}
]}
]}
];

let cur=CATS[0].id;
let done=JSON.parse(localStorage.getItem('az_done')||'{}');
let cnt=JSON.parse(localStorage.getItem('az_cnt')||'{}');
function save(){localStorage.setItem('az_done',JSON.stringify(done));localStorage.setItem('az_cnt',JSON.stringify(cnt));}

function getAllAz(cat){
  if(cat.subs)return cat.subs.flatMap(s=>s.azkar.map(a=>({...a,_k:s.title+'|'+a.n})));
  return cat.azkar.map(a=>({...a,_k:String(a.n)}));
}

function rpt(r){
  if(!r)return null;
  if(r.includes('مئة'))return 100;
  if(r.includes('سبع'))return 7;
  if(r.includes('عشر'))return 10;
  if(r.includes('ثلاث')||r.includes('ثلاثًا'))return 3;
  return null;
}

function renderNav(){
  const nav=document.getElementById('catNav');
  nav.innerHTML='';
  CATS.forEach(c=>{
    const b=document.createElement('button');
    b.className='cat-btn'+(c.id===cur?' active':'');
    b.textContent=c.name;
    b.onclick=()=>{cur=c.id;renderNav();renderContent();};
    nav.appendChild(b);
  });
}

function renderContent(){
  const cat=CATS.find(c=>c.id===cur);
  const el=document.getElementById('mainContent');
  el.innerHTML='';
  // title
  el.innerHTML=`<div class="section-title"><h2>${cat.name}</h2></div>`;
  // progress
  const all=getAllAz(cat);
  const dc=all.filter(a=>done[cur+'|'+a._k]).length;
  if(all.length>1){
    el.innerHTML+=`<div class="progress-label">${dc} / ${all.length} مكتمل</div><div class="progress-bar-wrap"><div class="progress-bar" style="width:${all.length?(dc/all.length*100):0}%"></div></div>`;
  }
  // cards
  if(cat.subs){
    cat.subs.forEach(s=>{
      el.innerHTML+=`<div class="subsection">${s.title}</div>`;
      s.azkar.forEach((a,i)=>renderCard(el,a,cur+'|'+s.title+'|'+a.n));
    });
  } else {
    cat.azkar.forEach(a=>renderCard(el,a,cur+'|'+a.n));
  }
  // reset
  el.innerHTML+=`<button class="reset-all-btn" onclick="resetAll()">↺ إعادة تعيين الكل</button>`;
}

function resetAll(){
  const cat=CATS.find(c=>c.id===cur);
  getAllAz(cat).forEach(a=>{delete done[cur+'|'+a._k];delete cnt[cur+'|'+a._k];});
  save();renderContent();
}

function renderCard(container,az,key){
  const isDone=!!done[key];
  const count=cnt[key]||0;
  const rn=rpt(az.r);
  const div=document.createElement('div');
  div.className='azkar-card'+(isDone?' done-card':'');
  div.id='c_'+key.replace(/[^a-z0-9]/gi,'_');
  let html=`<div class="azkar-num">${az.n}</div>`;
  html+=`<div class="done-check${isDone?' done':''}" onclick="toggleDone('${key}',this)" title="${isDone?'اضغط لإلغاء':'تحديد'}"></div>`;
  html+=`<div class="azkar-text">${az.t.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`;
  if(az.r) html+=`<span class="repeat-badge">🔁 ${az.r}</span>`;
  if(az.no) html+=`<div class="note-text">${az.no}</div>`;
  if(rn&&rn>1){
    html+=`<div class="counter-row">
      <button class="counter-btn" onclick="incCnt('${key}',${rn},this)">تسبيح</button>
      <div class="counter-display" id="cd_${key.replace(/[^a-z0-9]/gi,'_')}">${count} / ${rn}</div>
      <button class="counter-reset" onclick="resetCnt('${key}',${rn},this)">صفر</button>
    </div>`;
  }
  div.innerHTML=html;
  container.appendChild(div);
}

function toggleDone(key,el){
  done[key]=!done[key];
  save();renderContent();
}

function incCnt(key,max,btn){
  const newC=(cnt[key]||0)+1;
  cnt[key]=newC;
  const did=btn.closest('.azkar-card').id;
  const disp=document.getElementById('cd_'+key.replace(/[^a-z0-9]/gi,'_'));
  if(disp)disp.textContent=newC+' / '+max;
  if(newC>=max){done[key]=true;save();renderContent();}
  else save();
}

function resetCnt(key,max,btn){
  cnt[key]=0;
  const disp=document.getElementById('cd_'+key.replace(/[^a-z0-9]/gi,'_'));
  if(disp)disp.textContent='0 / '+max;
  save();
}

renderNav();renderContent();
</script>
</body>
</html>
